name: Deploy Promote

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - preprod
          - prod
      dry_run:
        description: 'Dry run (preview only)'
        required: false
        type: boolean
        default: false

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine source branch
        id: source
        run: |
          if [ "${{ inputs.target }}" = "preprod" ]; then
            echo "branch=master" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.target }}" = "prod" ]; then
            echo "branch=preprod" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          SOURCE="${{ steps.source.outputs.branch }}"
          TARGET="${{ inputs.target }}"
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')

          # Get commits between branches
          COMMITS=$(git log ${TARGET}..${SOURCE} --pretty=format:"%s (%h) by %an" --no-merges)
          FEAT_COUNT=$(echo "$COMMITS" | grep -c "^feat" || true)
          FIX_COUNT=$(echo "$COMMITS" | grep -c "^fix" || true)
          CHORE_COUNT=$(echo "$COMMITS" | grep -c "^chore" || true)
          TOTAL=$(echo "$COMMITS" | grep -c . || true)

          # Build PR body
          cat > /tmp/pr_body.md << EOF
          ## 🚀 Deployment to \`${TARGET}\`

          | Field | Value |
          |-------|-------|
          | **Source** | \`${SOURCE}\` |
          | **Target** | \`${TARGET}\` |
          | **Date** | ${TIMESTAMP} |
          | **Total Commits** | ${TOTAL} |
          | **Features** | ${FEAT_COUNT} |
          | **Bug Fixes** | ${FIX_COUNT} |
          | **Chores** | ${CHORE_COUNT} |

          ### Changes

          $(echo "$COMMITS" | sed 's/^/- /')

          ---
          _Auto-generated by Deploy Promote workflow_
          EOF

          echo "title=Deploy to ${TARGET} — ${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "total=${TOTAL}" >> $GITHUB_OUTPUT
          echo "feat_count=${FEAT_COUNT}" >> $GITHUB_OUTPUT
          echo "fix_count=${FIX_COUNT}" >> $GITHUB_OUTPUT

      - name: Preview (dry run)
        if: ${{ inputs.dry_run }}
        run: |
          echo "=== DRY RUN ==="
          echo "Would create PR:"
          echo "  Base: ${{ inputs.target }}"
          echo "  Head: ${{ steps.source.outputs.branch }}"
          echo "  Title: ${{ steps.changelog.outputs.title }}"
          echo ""
          echo "=== PR Body ==="
          cat /tmp/pr_body.md

      - name: Create PR
        if: ${{ !inputs.dry_run }}
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base "${{ inputs.target }}" \
            --head "${{ steps.source.outputs.branch }}" \
            --title "${{ steps.changelog.outputs.title }}" \
            --body-file /tmp/pr_body.md \
            --label "deployment,${{ inputs.target }}")
          echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT
          echo "✅ PR created: ${PR_URL}"

      - name: Post to Slack (prod only)
        if: ${{ inputs.target == 'prod' && !inputs.dry_run }}
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Production Deployment PR Created"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Commits:* ${{ steps.changelog.outputs.total }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Features:* ${{ steps.changelog.outputs.feat_count }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Fixes:* ${{ steps.changelog.outputs.fix_count }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*PR:* <${{ steps.create_pr.outputs.pr_url }}|View PR>"
                    }
                  ]
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "_Triggered by ${{ github.actor }}_"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
