name: Trigger Infrastructure Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. preprod/6.67.0+chart.1.2.3)'
        required: true
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - preprod
          - prod
          - qa
          - dev
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
      environment:
        type: string
        required: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate tag exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          if ! git tag -l "${{ inputs.tag }}" | grep -q .; then
            echo "ERROR: Tag '${{ inputs.tag }}' does not exist in git history"
            exit 1
          fi
      - name: Trigger infrastructure deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.INFRA_WORKFLOW_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'Sefaria',
              repo: 'infrastructure',
              workflow_id: 'static-env-deploy.yml',
              ref: 'main',
              inputs: {
                tag: '${{ inputs.tag }}',
                environment: '${{ inputs.environment }}'
              }
            })
