{% load i18n %}

    <nav id="aboutSidebar">
        {% if request.user_agent.is_mobile %}
            <h1 class="int-en">{{title}}</h1>
            <h1 class="int-he">{{heTitle}}</h1>
        {% endif %}
        <ul>
            {% for page in SITE_SETTINGS.ABOUT_SIDEBAR_PAGES %}
            <li><a id="{{ page.path }}" href="/{{ page.path }}">
                    <span class="int-en">{{ page.en }}<i class="fa fa-chevron-right"></i></span>
                    <span class="int-he">{{ page.he }}<i class="fa fa-chevron-left"></i></span></a></li>
            {% endfor %}
        </ul>
    </nav>
<script>
  const mobile = "{{request.user_agent.is_mobile}}" === "True";
  if (!mobile) {
      const whichPage = "{{whichPage}}";
      const item = document.getElementById(whichPage);
      item.className = 'selected';
      const aboutSidebar = document.getElementById("aboutSidebar");
      aboutSidebar.className = `${whichPage}`;
  }
  else {
      const aboutSidebar = document.getElementById("aboutSidebar");
      aboutSidebar.className = 'mobileAbout';
  }
</script>
