{{- if .Values.nameService.enabled }}
{{- range $index, $value := untilStep (int (sub .Release.Revision .Values.previousServicesCount)) (int (add .Release.Revision 1)) 1 }}
{{- if gt $value 0 }}
---
apiVersion: v1
kind: Service
metadata:
  name: name-{{ $.Values.deployEnv }}-{{ $value }}
  labels:
    app: name-{{ $.Values.deployEnv }}
    deployEnv: "{{ $.Values.deployEnv }}"
    stackRole: name
spec:
  ports:
  - port: 80
  selector:
    app: "name-{{ $.Values.deployEnv }}"
    releaseRevision: "{{ $value }}"
{{- end}}
{{- end}}
{{- end }}
