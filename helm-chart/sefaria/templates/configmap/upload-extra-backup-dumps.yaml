{{- if .Values.backup.mongo.extraBackupEnabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: upload-extra-backup-dumps-{{ .Values.deployEnv }}
  labels:
    deployEnv: "{{ .Values.deployEnv }}"
    {{- include "sefaria.labels" . | nindent 4 }}
data:
  upload-extra-backup-dumps.sh: |-
    #!/usr/bin/env bash
    set -euo pipefail
    set -x

    DATADIR="/mongodumps/shared_volume"
    today="$(date +'%d.%m.%y')"
    three_weeks_ago="$(date --date='21 days ago' +'%d.%m.%y')"

    if [ ! -f "${DATADIR}/db_name.txt" ]; then
        echo "ERROR: db_name.txt missing"
        exit 1
    fi
    DB=$(cat "${DATADIR}/db_name.txt")
    if [ -z "${DB}" ]; then
        echo "ERROR: db_name.txt is empty"
        exit 1
    fi

    # Rotation: remove snapshots from 3 weeks ago
    gsutil rm "gs://${BUCKET}/${PREFIX}history_${three_weeks_ago}.tar.gz" || true
    gsutil rm "gs://${BUCKET}/${PREFIX}linker_output_${three_weeks_ago}.tar.gz" || true
    gsutil rm "gs://${BUCKET}/${PREFIX}webpages_text_${three_weeks_ago}.tar.gz" || true

    # Upload history as its own tarball
    echo "Uploading history dump"
    tar czf - -C "${DATADIR}" \
        "./dump/${DB}/history.bson" \
        "./dump/${DB}/history.metadata.json" \
      | gsutil cp - "gs://${BUCKET}/${PREFIX}history_${today}.tar.gz"

    # Upload linker_output as its own tarball
    echo "Uploading linker_output dump"
    tar czf - -C "${DATADIR}" \
        "./dump/${DB}/linker_output.bson" \
        "./dump/${DB}/linker_output.metadata.json" \
      | gsutil cp - "gs://${BUCKET}/${PREFIX}linker_output_${today}.tar.gz"

    # Upload webpages_text as its own tarball
    echo "Uploading webpages_text dump"
    tar czf - -C "${DATADIR}" \
        "./dump/${DB}/webpages_text.bson" \
        "./dump/${DB}/webpages_text.metadata.json" \
      | gsutil cp - "gs://${BUCKET}/${PREFIX}webpages_text_${today}.tar.gz"

    echo "Extra backup upload complete"
{{- end }}
