{{- if .Values.backup.mongo.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: upload-dumps-{{ .Values.deployEnv }}
  labels:
    deployEnv: "{{ .Values.deployEnv }}"
    {{- include "sefaria.labels" . | nindent 4 }}
data:
  upload-dumps.sh: |-
    #!/usr/bin/env bash
    set -x

    DATADIR="/mongodumps/shared_volume"
    today="$(date +'%d.%m.%y')"
    last_week="$(date --date='last week' +'%d.%m.%y')"

    if [ ! -d "${DATADIR}/dump" ]; then
        echo "ERROR: dump directory missing"
        exit 1
    fi

    DB=$(cat "${DATADIR}/db_name.txt")

    # Pipe tar output directly into gsutil instead of writing a file first.
    # This keeps peak disk usage to just the dump directory (~11G).
    stream_to_gcs() {
        local dest="$1"
        shift
        local excludes=()
        for f in "$@"; do
            excludes+=("--exclude=./dump/${DB}/${f}")
        done
        echo "Streaming to ${dest}"
        tar czf - -C "${DATADIR}" "${excludes[@]}" ./dump | gsutil cp - "${dest}"
    }

    gsutil rm "gs://${BUCKET}/${PREFIX}private_dump_${last_week}.tar.gz" || true
    gsutil rm "gs://${BUCKET}/${PREFIX}private_dump_small_${last_week}.tar.gz" || true

    # Private full: all collections (except django_cache and user_history excluded at dump time).
    echo "Uploading private full dump"
    stream_to_gcs "gs://${BUCKET}/${PREFIX}private_dump_${today}.tar.gz"
    if [ "$(date +'%d')" == "01" ]; then
        echo "Archiving to Nearline Storage"
        stream_to_gcs "gs://${ARCHIVE_BUCKET}/${PREFIX}private_dump_${today}.tar.gz"
    fi

    # Private small: same as full minus history — for faster restores when history is not needed.
    echo "Uploading private small dump"
    stream_to_gcs "gs://${BUCKET}/${PREFIX}private_dump_small_${today}.tar.gz" \
        "history.bson" "history.metadata.json"

    {{- if .Values.backup.mongo.public }}
    if [ ! -d "${DATADIR}/public_texts_dump" ]; then
        echo "ERROR: public_texts_dump directory missing"
        exit 1
    fi

    # Swap in license-filtered texts for public variants, restore after upload.
    # Use mv (rename) instead of cp to avoid holding two copies of texts.bson on
    # disk simultaneously — both source and destination are in the same emptyDir,
    # so mv is a metadata-only operation that does not consume additional space.
    mv "${DATADIR}/dump/${DB}/texts.bson"          "${DATADIR}/dump/${DB}/texts_full.bson"
    mv "${DATADIR}/dump/${DB}/texts.metadata.json" "${DATADIR}/dump/${DB}/texts_full.metadata.json"
    mv "${DATADIR}/public_texts_dump/${DB}/texts.bson"          "${DATADIR}/dump/${DB}/texts.bson"
    mv "${DATADIR}/public_texts_dump/${DB}/texts.metadata.json" "${DATADIR}/dump/${DB}/texts.metadata.json"
    rm -rf "${DATADIR}/public_texts_dump"

    PRIVATE_FILES=(
        "apikeys.bson"                    "apikeys.metadata.json"
        "notes.bson"                      "notes.metadata.json"
        "layers.bson"                     "layers.metadata.json"
        "sheets.bson"
        "locks.bson"                      "locks.metadata.json"
        "notifications.bson"              "notifications.metadata.json"
        "profiles.bson"                   "profiles.metadata.json"
        "trend.bson"                      "trend.metadata.json"
        "user_story.bson"                 "user_story.metadata.json"
        "Copy_of_user_history.bson"       "Copy_of_user_history.metadata.json"
    )

    # Public small: filtered texts, no history, no private collections — publicly readable.
    echo "Uploading public small dump"
    stream_to_gcs "gs://${BUCKET}/${PREFIX}dump_small.tar.gz" \
        "history.bson" "history.metadata.json" \
        "${PRIVATE_FILES[@]}"
    gsutil acl ch -u AllUsers:R "gs://${BUCKET}/${PREFIX}dump_small.tar.gz"

    # Public full: filtered texts, with history, no private collections — publicly readable.
    echo "Uploading public full dump"
    stream_to_gcs "gs://${BUCKET}/${PREFIX}dump.tar.gz" \
        "${PRIVATE_FILES[@]}"
    gsutil acl ch -u AllUsers:R "gs://${BUCKET}/${PREFIX}dump.tar.gz"

    mv "${DATADIR}/dump/${DB}/texts_full.bson"          "${DATADIR}/dump/${DB}/texts.bson"
    mv "${DATADIR}/dump/${DB}/texts_full.metadata.json" "${DATADIR}/dump/${DB}/texts.metadata.json"

    {{- end }}
{{- end }}
