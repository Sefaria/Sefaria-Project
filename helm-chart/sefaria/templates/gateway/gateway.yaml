{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.deployEnv }}
  labels:
    {{- include "sefaria.labels" . | nindent 4 }}
  annotations: {{ .Values.gateway.annotations | toYaml | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    {{- range .Values.domains.root }}
    {{- $code := .code }}
    {{- if kindIs "slice" $code }}
      {{- $code = index $code 0 }}
    {{- end }}
    {{- $rootDomain := tpl .url $ | quote | trimAll "\"" }}
    {{- $wwwDomain := printf "www.%s" $rootDomain }}
    {{- $secretName := tpl .cert $ | default ( printf "origin-%s-%s-tls"  $.Values.deployEnv $code ) }}
    - name: http-{{ $code }}
      protocol: HTTP
      port: 80
      hostname: {{ $rootDomain }}
    - name: https-{{ $code }}
      protocol: HTTPS
      port: 443
      hostname: {{ $rootDomain }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: {{ $secretName }}
    - name: http-www-{{ $code }}
      protocol: HTTP
      port: 80
      hostname: {{ $wwwDomain }}
    - name: https-www-{{ $code }}
      protocol: HTTPS
      port: 443
      hostname: {{ $wwwDomain }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: {{ $secretName }}
    {{- range $.Values.domains.modules }}
    {{- $subdomain := index .subdomains $code }}
    {{- if $subdomain }}
    {{- $subdomainURL := printf "%s.%s" $subdomain $rootDomain }}
    - name: http-{{ $subdomain }}-{{ $code }}
      protocol: HTTP
      port: 80
      hostname: {{ $subdomainURL }}
    - name: https-{{ $subdomain }}-{{ $code }}
      protocol: HTTPS
      port: 443
      hostname: {{ $subdomainURL }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: {{ $secretName }}
    {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
