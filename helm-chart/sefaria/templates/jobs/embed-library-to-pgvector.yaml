# NB: This assumes pgvector (Service "pgvector", Secret "pgvector-secret") and the
# "gemini-api-key" Secret already exist in this namespace.
---
{{- if .Values.jobs.embedLibraryToPgvector.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: embed-library-to-pgvector-{{ .Values.deployEnv }}
  labels:
    deployEnv: {{ .Values.deployEnv | quote }}
    {{- include "sefaria.labels" . | nindent 4 }}
spec:
  completionMode: Indexed
  parallelism: {{ .Values.jobs.embedLibraryToPgvector.shardCount }}
  completions: {{ .Values.jobs.embedLibraryToPgvector.shardCount }}
  backoffLimit: {{ .Values.jobs.embedLibraryToPgvector.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "sefaria.labels" . | nindent 8 }}
    spec:
      {{- include "sefaria.nonPreemptibleAffinityBlock" . | nindent 6 }}
      restartPolicy: Never
      containers:
        - name: embed-library-to-pgvector
          image: "{{ .Values.web.containerImage.imageRegistry }}:{{ .Values.web.containerImage.tag }}"
          command: ["/app/run", "/app/scripts/embed_library_to_pgvector.py"]
          args:
            - "--shard-count={{ .Values.jobs.embedLibraryToPgvector.shardCount }}"
          env:
            - name: PGVECTOR_HOST
              value: {{ .Values.jobs.embedLibraryToPgvector.pgvector.host | quote }}
            - name: PGVECTOR_PORT
              value: {{ .Values.jobs.embedLibraryToPgvector.pgvector.port | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.localSettings.ref }}
                optional: true
            - configMapRef:
                name: local-settings-{{ .Values.deployEnv }}
                optional: true
            - secretRef:
                name: local-settings-secrets-{{ .Values.deployEnv }}
                optional: true
            - secretRef:
                name: pgvector-secret
            - secretRef:
                name: gemini-api-key
          resources:
            requests:
              memory: {{ .Values.jobs.embedLibraryToPgvector.resources.requests.memory }}
              cpu: {{ .Values.jobs.embedLibraryToPgvector.resources.requests.cpu }}
            limits:
              memory: {{ .Values.jobs.embedLibraryToPgvector.resources.limits.memory }}
          volumeMounts:
            - mountPath: /app/sefaria/local_settings.py
              name: local-settings
              subPath: local_settings.py
              readOnly: true
      volumes:
        - name: local-settings
          configMap:
            name: local-settings-file-{{ .Values.deployEnv }}
            items:
              - key: local_settings.py
                path: local_settings.py
  ttlSecondsAfterFinished: 432000
{{- end }}
