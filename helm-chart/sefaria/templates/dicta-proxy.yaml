{{- if .Values.dictaProxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dicta-proxy-{{ .Values.deployEnv }}
  labels:
    app: dicta-proxy-{{ .Values.deployEnv }}
    deployEnv: "{{ .Values.deployEnv }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dicta-proxy-{{ .Values.deployEnv }}
  template:
    metadata:
      labels:
        app: dicta-proxy-{{ .Values.deployEnv }}
        deployEnv: "{{ .Values.deployEnv }}"
    spec:
      containers:
      - name: dicta-proxy
        image: "{{ .Values.web.containerImage.imageRegistry }}:{{ .Values.web.containerImage.tag }}"
        imagePullPolicy: Always
        command: ["python3", "/app/scripts/dicta_proxy.py", "--port", "{{ .Values.dictaProxy.port }}"]
        ports:
        - containerPort: {{ .Values.dictaProxy.port }}
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        readinessProbe:
          tcpSocket:
            port: {{ .Values.dictaProxy.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dicta-proxy-{{ .Values.deployEnv }}
  labels:
    app: dicta-proxy-{{ .Values.deployEnv }}
    deployEnv: "{{ .Values.deployEnv }}"
spec:
  selector:
    app: dicta-proxy-{{ .Values.deployEnv }}
  ports:
  - port: {{ .Values.dictaProxy.port }}
    targetPort: {{ .Values.dictaProxy.port }}
    protocol: TCP
  type: ClusterIP
{{- end }}
