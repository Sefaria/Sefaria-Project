apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: rollout-complete-{{ .Values.deployEnv }}
  labels:
    deployEnv: "{{ .Values.deployEnv }}"
spec:
  args:
    - name: revision
    - name: deployment
    - name: version
    - name: chartVersion
  metrics:
    - name: healthcheck-ready
      provider:
        job:
          spec:
            backoffLimit: 1
            template:
              spec:
                containers:
                  - name: completion-message
                    image: curlimages/curl
                    command: [ "sh"]
                    args:
                      - -c
                      - > 
                        curl
                        -X
                        POST
                        --data-urlencode
                        'payload={"username": "Deployment Status", "text": "'$ENV' revision '$REVISION' has deployed version '$VERSION' using chart '$CHART_VERSION'", "icon_emoji": ":globe_with_meridians:"}'
                        $SLACK_URL 
                        ||
                        /bin/true
                    env:
                      - name: REVISION
                        value: "{{`{{args.revision}}`}}" # {{`...`}}
                      - name: ENV   
                        value: "{{`{{args.deployment}}`}}" # {{`...`}}
                      - name: VERSION
                        value: "{{`{{args.version}}`}}" # {{`...`}}
                      - name: CHART_VERSION
                        value: "{{`{{args.chartVersion}}`}}"
                      # SLACK_URL comes from local-settings-secrets (via the configured localSettings
                      # ref); the dedicated slack-webhook secret has been retired (SC-44609). No channel
                      # override is sent — the incoming webhook posts to its own configured channel.
                      # optional + `|| /bin/true` keep the post-promotion notification non-fatal.
                      - name: SLACK_URL
                        valueFrom:
                          secretKeyRef:
                            name: {{ .Values.secrets.localSettings.ref }}
                            key: SLACK_URL
                            optional: true
                restartPolicy: Never
