apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: rollout-complete-{{ .Values.deployEnv }}
  labels:
    deployEnv: "{{ .Values.deployEnv }}"
spec:
  args:
    - name: revision
    - name: deployment
    - name: version
    - name: chartVersion
  metrics:
    - name: healthcheck-ready
      provider:
        job:
          spec:
            backoffLimit: 1
            template:
              spec:
                containers:
                  - name: completion-message
                    image: curlimages/curl
                    command: [ "sh"]
                    args:
                      - -c
                      - > 
                        curl
                        -X
                        POST
                        --data-urlencode
                        'payload={"channel": "#'$CHANNEL'", "username": "Deployment Status", "text": "'$ENV' revision '$REVISION' has deployed version '$VERSION' using chart '$CHART_VERSION'", "icon_emoji": ":globe_with_meridians:"}'
                        $SLACK_URL 
                        ||
                        /bin/true
                    env:
                      - name: REVISION
                        value: "{{`{{args.revision}}`}}" # {{`...`}}
                      - name: ENV   
                        value: "{{`{{args.deployment}}`}}" # {{`...`}}
                      - name: VERSION
                        value: "{{`{{args.version}}`}}" # {{`...`}}
                      - name: CHART_VERSION
                        value: "{{`{{args.chartVersion}}`}}"
                      # SLACK_URL and the target channel both come from local-settings-secrets
                      # (SLACK_CHANNEL added there in the infra repo); the dedicated slack-webhook
                      # secret has been retired (SC-44609). optional: keeps the post-promotion
                      # notification non-fatal if a key is absent (the curl is also `|| /bin/true`).
                      - name: SLACK_URL
                        valueFrom:
                          secretKeyRef:
                            name: local-settings-secrets-{{ .Values.deployEnv }}
                            key: SLACK_URL
                            optional: true
                      - name: CHANNEL
                        valueFrom:
                          secretKeyRef:
                            name: local-settings-secrets-{{ .Values.deployEnv }}
                            key: SLACK_CHANNEL
                            optional: true
                restartPolicy: Never
