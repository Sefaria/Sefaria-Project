---
# Need to pass $BUILD_ID to this key when applying the helm chart in CI.
# or
# Set the commit hash for a particular build to deploy built image for that
# commit ID. (NOTE: This would work only if the image is built for that commit
# ID.)
releaseImageTag:

sandbox: "false"

# Shared node affinity applied to all long-running mongo jobs (backup, restore, sync).
# Prevents scheduling on preemptible GKE nodes that Google can reclaim mid-run.
# Set to {} in environment values to allow any node pool.
nonPreemptibleNodeAffinity:
  requiredDuringSchedulingIgnoredDuringExecution:
    nodeSelectorTerms:
      - matchExpressions:
          - key: cloud.google.com/gke-preemptible
            operator: DoesNotExist

# This value sets the name of the environment and it's associated objects. Some
# suggestions for the values are prod/dev/test
deployEnv: "dev"

# Helps create services for nginx, nodejs, varnish and web pods with appropriate
# tags that help ArgoCD do blue green deployments.
previousServicesCount: "3"

# runs post-promotion job with slack hook to alert when deployment is complete
deploymentMessage: false

# controls whether rollout pre-promotion analysis is enabled
rollouts:
  prePromotionAnalysis: true

# enabling this feature creates an ephemeral database image prepopulated with test data
# It is intended for use within the sefaria automated testing environment
# For development environments:
# - install mongo using an upstream chart
# - enable restore
# - populate the settings with the appropriate connection details
mongo:
  enabled: false
  image:
    registry: us-east1-docker.pkg.dev/development-205018/sefaria-public
    image: sefaria-mongo
    tag: latest

# write the full path to the back up if you want to start the environment from
# a specific backup else leave blank.
restore:
  enabled: true
  dynamicName: true
  cleanup: true
  bucket: sefaria-mongo-backup
  # tarball:
  serviceAccount: database-backup-read
# config to backup environment DB
backup:
  mongo:
    enabled: false
    extraBackupEnabled: false
    prefix: ""
    public: true
    bucket: sefaria-mongo-backup
    archiveBucket: sefaria-mongo-archive
    serviceAccount: database-backup-write
    version: 4.4
  postgres:
    enabled: false
    version: 10.3
    prefix: ""
    bucket: sefaria-user-backup
    serviceAccount: database-backup-write
  sitemaps:
    enabled: false
    serviceAccount: database-backup-write
    bucket: sefaria-sitemaps

export:
  enabled: false
  bucket: sefaria-export
  schedule: "0 3 1 * *"
  serviceAccount: text-export-write

# PostgreSQL configuration - can be overridden per environment
postgres:
  # host: defaults to DATABASES_HOST from secret if not specified
  db: "sefaria_auth"
  restore: false
  sync: false


web:
  # key-pair values to load into web pod environment.  Takes precedence over global localsettings
  localsettings:
  # APP: web
  containerImage:
    # Full path of the image registry imclusive of the image name
    imageRegistry: us-east1-docker.pkg.dev/production-deployment/containers/sefaria-web
    # Commit id of the repo for which the image build has been triggered.
    tag: latest
  replicaCount: 1
  resources:
    web:
      gunicornWorkerCount: 1
      gunicornThreadCount: 1
      resources:
        requests:
          memory: "1Gi"
          cpu: "100m"
        limits:
          memory: "3Gi"
          cpu: "1000m"
    djangoLog:
      requests:
        memory: "100Mi"
        cpu: "50m"
      limits:
        memory: "150Mi"
        cpu: "100m"
  secrets:
    googleClient:
      # for local testing purposes or CI pipeline use input a value
      # data:
      # Reference to an existing secret in the cluster
      ref:
    logging:
      # for local testing purposes or CI pipeline use input a value
      # data:
      # Reference to an existing secret in the cluster
      ref:
    schoolLookup:
      # for local testing purposes or CI pipeline use input a value
      # data:
      # Reference to an existing secret in the cluster
      ref:
    elasticCertificate:
      # for local testing purposes or CI pipeline use input a value
      # data:
      # Reference to an existing secret in the cluster
      ref:

redis:
  containerImage:
    # Full path of the image registry inclusive of the image name
    imageRegistry: redis
    # Version of varnish that's required for the application.
    tag: latest
  replicaCount: 1
  resources:
    requests:
      memory: "250Mi"
      cpu: "100m"
    limits:
      memory: "500Mi"
      cpu: "120m"
  # enable pod disruption budget
  pdb: false

nodejs:
  containerImage:
    # Full path of the image registry inclusive of the image name
    imageRegistry: us-east1-docker.pkg.dev/production-deployment/containers/sefaria-node
    # Commit id of the repo for which the image build has been triggered.
    tag: latest
  # key-pair values to load into node pod environment.  Takes precedence over global localsettings
  localsettings:
  # APP: node
  replicaCount: 1
  resources:
    requests:
      memory: "100Mi"
      cpu: "100m"
    limits:
      memory: "200Mi"
      cpu: "400m"
  heapSize: 150

varnish:
  containerImage:
    # Full path of the image registry inclusive of the image name
    imageRegistry: ibmcom/varnish
    # Version of varnish that's required for the application.
    tag: 0.32.0
  logging: {}
  replicaCount: 1
  resources:
    requests:
      # must be in megabibytes, because we pass it into the malloc definition
      memory: "25Mi"
      cpu: "10m"
    limits:
      memory: "300Mi"
      cpu: "100m"
  tuning:
    # malloc should be ~75% of the memory request.
    malloc: "250m"
    nuke_limit: "400"
    # Threading
    # http://book.varnish-software.com/4.0/chapters/Tuning.html#details-of-threading-parameters
    thread_pools: 2  # Default: 2
    thread_pool_max: 5000  # Default: 5000; should be a function of resources.request.memory
    thread_pool_min: 100  # Default: 100
    # Timers
    # http://book.varnish-software.com/4.0/chapters/Tuning.html#timers
    first_byte_timeout: 90  # Default 60s
    between_bytes_timeout: 90  # Default 60s
  secrets:
    varnish:
      # for local testing purposes or CI pipeline use input a value
      # data:
      # Reference to an existing secret in the cluster
      ref:
  monitoring:
    enabled: false
    image: ibmcom/varnish-metrics-exporter
    tag: 0.32.0

tasks:
  localsettings: {}
  enabled: false
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "1000m"
  replicaCount: 1
  anthropicSecretRef: anthropic-api-key
  openaiSecretRef: openai-api-key
  langsmithSecretRef: langsmith-api-key
  redis:
    url: "redis://127.0.0.1"
    port: "6397"
    brokerDBNumber: "0"
    resultBackendDBNumber: "1"
    sentinelURL: ""
    transportOptions: {}
    redisPassword:
      ref: redis-password
    sentinelPassword:
      ref: sentinel-password
  queues:
    llm: default-llm
  nodeAffinity: {}

# Takes the url of an NER server instance
# Will automatically enable internal settings to communicate with the NER server
# Required for Rambi Cronjob
gpuServer: ""

# Declare domains handled by this sefaria instance for both app and ingress config
# Root domains implicitly handle the library module and do not feature redirects
# Each root domain should have a language and code
# Modules definitions include
#   module name
#   a subdomain per corresponding language root
#   root domain paths that should redirect into the module
# Cookie domain will be set to the first domain in the root list
domains:
  root:
    - url: "{{ .Values.deployEnv }}.cauldron.sefaria.org"
      cert: "{{ .Values.deployEnv }}-tls"
      # multilanguage domains support limited redirect and subdomain handling
      # only the first list entry will have redirects and subdomains set up
      # for any given module
      code:
        - en
        - he
#   - url: "{{ .Values.deployEnv }}.cauldron.sefaria.org.il"
#     cert: "{{ .Values.deployEnv }}-il-tls"
#     code:
#       - he
  modules:
    - name: voices
      subdomains:
        en: voices
        he: voices
      redirects:
        - sheets
        - collections
        - profile

ingress:
  enabled: false

gateway:
  enabled: true
  className: envoy
  alpnProtocols:
    - http/1.1
  annotations:
    cert-manager.io/cluster-issuer: ingress-ca

nginx:
  containerImage:
    # Full path of the image registry inclusive of the image name
    imageRegistry: us-east1-docker.pkg.dev/production-deployment/containers/sefaria-asset
    # Commit id of the repo for which the image build has been triggered.
    tag: latest
  # set to search-democracy for democracy
  SEARCH_HOST: elasticsearch-es-default.elasticsearch
  SEARCH_PORT: 9200
  SEARCH_PATH: ""
  SEARCH_SSL_ENABLE: false
  disableScraping: true
  # key-pair values to load into nginx pod environment.  Takes precedence over global localsettings
  localsettings:
  # APP: nginx
  replicaCount: 1
  resources:
    requests:
      memory: "200Mi"
      cpu: "80m"
    limits:
      memory: "300Mi"
      cpu: "150m"

monitor:
  # key-pair values to load into monitor pod environment.  Takes precedence over global localsettings
  localsettings:
  # APP: monitor
  containerImage:
    # Full path of the image registry inclusive of the image name
    imageRegistry: us-east1-docker.pkg.dev/production-deployment/containers/sefaria-web
    # Commit id of the repo for which the image build has been triggered.
    tag: latest
  replicaCount: 1
  resources:
    requests:
      memory: "300Mi"
      cpu: "50m"
    limits:
      memory: "400Mi"
      cpu: "100m"

secrets:
  localSettings:
    # A reference to a secret containing the local settings
    ref: local-settings-secret
    # The data keys can be used to override values in the local settings secret.
    # This is intended for local development use and CI, do not use this in
    # production.
    #
    # data:
    #   DATABASES_HOST:
    #   DATABASES_PASS:
    #   DATABASES_USER:
    #   DATABASES_PORT:
    #   GOOGLE_OAUTH2_CLIENT_ID:
    #   GOOGLE_OAUTH2_CLIENT_SECRET:
    #   SECRET_KEY:
    #   MANDRILL_API_KEY:
    #   SEFARIA_DB:
    #   SEFARIA_DB_USER:
    #   SEFARIA_DB_PASSWORD:
    #   SEARCH_URL
    #   SEFARIA_BOT_API_KEY:
    #   CLOUDFLARE_ZONE:
    #   CLOUDFLARE_EMAIL:
    #   CLOUDFLARE_TOKEN:
    #   GOOGLE_TAG_MANAGER_CODE:
    #   GOOGLE_GTAG:
    #   HOTJAR_ID:
    #   AWS_ACCESS_KEY:
    #   AWS_SECRET_KEY:
    #   S3_BUCKET:
    #   NATIONBUILDER_TOKEN:
    #   NATIONBUILDER_CLIENT_ID:
    #   NATIONBUILDER_CLIENT_SECRET:
    #   MAILCHIMP_API_KEY:
    #   MAILCHIMP_ANNOUNCE_ID:
    #   MAILCHIMP_WEBHOOK_KEY:
    #   RECAPTCHA_PUBLIC_KEY:
    #   RECAPTCHA_PRIVATE_KEY:
    #   SIMPLE_JWT_SIGNING_KEY:
    #   REDIS_PORT
    #   REDIS_PASSWORD
    #   CELERY_REDIS_BROKER_DB_NUM
    #   CELERY_REDIS_RESULT_BACKEND_DB_NUM
    #   CELERY_QUEUES
    #   SENTINEL_HEADLESS_URL
    #   SENTINEL_TRANSPORT_OPTS
    #   SENTINEL_PASSWORD
    #   REDIS_URL
    #   MOBILE_APP_KEY:
  backupManager:
    # If you're using a reference to an existing secret then the data: section
    # should be commented out and vice-versa.
    ref:
    # data:
    #   key:
    #   serviceAccount:
  webpageCronjob:
    # If you're using a reference to an existing secret then the data: section
    # should be commented out and vice-versa.
    ref: trello-secret
    # data:
  elasticUser:
    # If you're using a reference to an existing secret then the data: section
    # should be commented out and vice-versa.
    ref: elastic-user
    # data:
  elasticAdmin:
    # If you're using a reference to an existing secret then the data: section
    # should be commented out and vice-versa.
    ref: elastic-admin
    # data:

# Settings for various cronjobs
cronJobs:
  # Settings for regenerating long cached data
  regenerate:
    enabled: true
  dailyEmailNotifications:
    enabled: false
  indexFromQueue:
    enabled: false
  metrics:
    enabled: false
  nationBuilderSync:
    enabled: false
  rambiWebpagesWeekly:
    enabled: false
  reindexElasticSearch:
    enabled: false
    SEARCH_HOST_ES6: ""
    SEARCH_HOST_ES8: ""
  topicsIndexing:
    enabled: false
  trello:
    enabled: false
  trends:
    enabled: false
  weeklyEmailNotifications:
    enabled: false
  syncPostgresProductionData:
    enabled: false
  syncMongoProductionData:
    enabled: false

localSettings:
  DEBUG: true
  DOMAIN_LANGUAGE: {}
    # https://www.sefaria.org: english
    # https://www.sefaria.org.il: hebrew
  APSCHEDULER_NAME: "apscheduler-{{ .Values.deployEnv }}"
  SEARCH_INDEX_NAME_TEXT: "text"  # Override per cauldron for isolated indexes (e.g. "prod-sync_text")
  SEARCH_INDEX_NAME_SHEET: "sheet"  # Override per cauldron for isolated indexes (e.g. "prod-sync_sheet")
  USE_CLOUDFLARE: false
  FRONT_END_URL: "http://www.sefaria.org"  # Use "http://${ENV_NAME}.cauldron.sefaria.org" in cauldrons
  OFFLINE: "False"
  DOWN_FOR_MAINTENANCE: "False"
  MAINTENANCE_MESSAGE: "Sefaria is down for scheduled maintenance. We expect to be back online within 15 minutes. Thank you for your patience."
  GLOBAL_WARNING: "False"
  GLOBAL_WARNING_MESSAGE: "Sefaria will be in <b>Read-Only</b> mode for scheduled maintenance from 4:45pm-6:45pm Pacific time. Edits will <b>not</b> be saved during that time."
  SITE_PACKAGE: "sites.sefaria"
  DEFAULT_FROM_EMAIL: "Sefaria <hello@sefaria.org>"
  SERVER_EMAIL: "dev@sefaria.org"
  MULTISERVER_ENABLED: "True"
  CRM_TYPE: "NATIONBUILDER"
  FAIL_GRACEFULLY: "True"
  SESSION_COOKIE_SECURE: true
  SESSION_COOKIE_HTTPONLY: true
  SESSION_COOKIE_SAMESITE: "Lax"
  CSRF_COOKIE_SECURE: true
  CSRF_COOKIE_HTTPONLY: false
  CSRF_COOKIE_SAMESITE: "Lax"

instrumentation:
  enabled: false
  otelEndpoint: ""
  jaegerEndpoint: ""

datadog:
  enabled: false

# KEDA autoscaling. Requires KEDA (keda.sh) installed in the cluster.
# Default config is pre-populated for test environments (scale to zero when idle, scale up on traffic,
# scale down after 30 min). To activate for a test environment, set keda.enabled: true.
# keda.enabled must be true for any KEDA ScaledObjects to render. In production, enable it globally
# only when you intend to use KEDA, then use per-component enable flags and overrides as needed.
keda:
  enabled: false
  # Prometheus server used by all triggers unless overridden per-component.
  # Rendered with tpl, so {{ .Values.deployEnv }} etc. are available if needed.
  prometheusAddress: http://prometheus-kube-prometheus-prometheus.monitoring:9090
  # How often KEDA polls the trigger (seconds). Up to this long before scale-up begins after first request.
  pollingInterval: 30
  # Seconds of idle trigger before scaling back to minReplicas.
  cooldownPeriod: 1800
  minReplicas: 0
  maxReplicas: 2
  # Shared triggers applied to all ScaledObjects unless overridden per-component.
  # Scoped to this environment's HTTPRoute cluster names so environments don't affect each other.
  # Values are rendered with tpl, so {{ .Values.deployEnv }} and {{ .Release.Namespace }} are available.
  triggers:
    - type: prometheus
      metadata:
        serverAddress: "{{ .Values.keda.prometheusAddress }}"
        metricName: envoy_cluster_upstream_rq
        # Threshold is RPS per replica. Validate against real traffic before treating as final.
        threshold: "50"
        # or vector(0) prevents no-data errors when all pods are scaled to zero.
        query: >-
          sum(rate(envoy_cluster_upstream_rq_total{envoy_cluster_name=~"httproute/{{ .Release.Namespace }}/{{ .Values.deployEnv }}/.*"}[2m])) or vector(0)
  # Per-component enable flags. Any of minReplicas/maxReplicas/cooldownPeriod/pollingInterval/triggers
  # can be overridden per-component; unset fields fall back to the keda-level defaults above.
  web:
    enabled: true
  nginx:
    enabled: true
    # Never scale to zero — nginx is the direct Envoy downstream and must always have endpoints.
    minReplicas: 1
  varnish:
    enabled: true
    # Scale to zero when idle, but never above 1 — multiple instances fragment the cache.
    maxReplicas: 1
  nodejs:
    enabled: true
  monitor:
    enabled: true
  tasks:
    enabled: true
  redis:
    enabled: true
    # Redis is a plain Deployment, not an Argo Rollout.
    apiVersion: apps/v1
    kind: Deployment
    maxReplicas: 1
  # Splash page served by Envoy Gateway during cold-start (scale-from-zero).
  # Requires Envoy Gateway v1.1+ (BackendTrafficPolicy responseOverride).
  splash:
    enabled: true
    statusCodes:
      - type: Value
        value: 502
      - type: Value
        value: 503
    body: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Environment starting — Sefaria</title>
        <style>
          body { font-family: sans-serif; display: flex; align-items: center; justify-content: center;
                 height: 100vh; margin: 0; background: #f5f5f5; color: #333; }
          .card { text-align: center; background: #fff; padding: 2rem 3rem; border-radius: 8px;
                  box-shadow: 0 2px 8px rgba(0,0,0,.1); max-width: 480px; }
          h2 { margin-top: 0; }
          .timer { font-size: 2rem; font-weight: bold; margin: 1rem 0; color: #555; }
          .warning { color: #c0392b; font-weight: bold; }
          .note { font-size: .85rem; color: #888; margin-top: 1.5rem; }
        </style>
      </head>
      <body>
        <div class="card">
          <h2>Environment is starting up</h2>
          <p>This test environment was scaled down while idle.<br>It should be ready within a few minutes.</p>
          <div class="timer" id="timer">0:00</div>
          <p id="status">Checking again in <span id="countdown">15</span>s&hellip;</p>
          <p id="warn" class="warning" style="display:none">
            Taking longer than expected — there may be an issue with this cauldron that needs investigation.
          </p>
          <p class="note">This page refreshes automatically.</p>
        </div>
        <script>
          var WARN_AFTER = 180;
          var RELOAD_INTERVAL = 15;
          var key = 'keda_splash_start_' + location.hostname;

          var start = (function() {
            try {
              var s = parseInt(localStorage.getItem(key) || '0');
              if (!s) { s = Date.now(); localStorage.setItem(key, s); }
              return s;
            } catch(e) { return Date.now(); }
          })();

          function clearStart() {
            try { localStorage.removeItem(key); } catch(e) {}
          }

          function fmt(s) {
            var m = Math.floor(s / 60);
            return m + ':' + ('0' + (s - m * 60)).slice(-2);
          }

          var countdown = RELOAD_INTERVAL;
          setInterval(function() {
            var elapsed = Math.floor((Date.now() - start) / 1000);
            document.getElementById('timer').textContent = fmt(elapsed);
            if (elapsed >= WARN_AFTER) document.getElementById('warn').style.display = '';
            countdown--;
            document.getElementById('countdown').textContent = countdown;
            if (countdown <= 0) { clearStart(); location.reload(); }
          }, 1000);
        </script>
      </body>
      </html>
